<svg width="1000" height="420" viewBox="0 0 1000 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Animated cyber terminal">
  <defs>
    <linearGradient id="border" x1="0" y1="0" x2="1000" y2="420">
      <stop stop-color="#00e5ff"/>
      <stop offset="0.55" stop-color="#8a2be2"/>
      <stop offset="1" stop-color="#39ff14"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip"><rect x="42" y="42" width="916" height="336" rx="18"/></clipPath>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace; }
      .cursor { animation: blink 1s steps(1,end) infinite; }
      .scan { animation: scan 4s linear infinite; }
      .l1 { animation: show 9s steps(1,end) infinite; }
      .l2 { animation: show2 9s steps(1,end) infinite; }
      .l3 { animation: show3 9s steps(1,end) infinite; }
      .l4 { animation: show4 9s steps(1,end) infinite; }
      .l5 { animation: show5 9s steps(1,end) infinite; }
      @keyframes blink { 50% { opacity: 0; } }
      @keyframes scan { from { transform: translateY(-360px); } to { transform: translateY(360px); } }
      @keyframes show { 0%,8%{opacity:0} 9%,100%{opacity:1} }
      @keyframes show2 { 0%,23%{opacity:0} 24%,100%{opacity:1} }
      @keyframes show3 { 0%,38%{opacity:0} 39%,100%{opacity:1} }
      @keyframes show4 { 0%,55%{opacity:0} 56%,100%{opacity:1} }
      @keyframes show5 { 0%,72%{opacity:0} 73%,100%{opacity:1} }
    </style>
  </defs>
  <rect width="1000" height="420" rx="24" fill="#050505"/>
  <rect x="25" y="25" width="950" height="370" rx="24" fill="#071018" stroke="url(#border)" stroke-width="2" filter="url(#glow)"/>
  <rect x="25" y="25" width="950" height="46" rx="24" fill="#0b121a"/>
  <circle cx="58" cy="48" r="6" fill="#ff005d"/>
  <circle cx="82" cy="48" r="6" fill="#f9d423"/>
  <circle cx="106" cy="48" r="6" fill="#39ff14"/>
  <text x="136" y="54" class="mono" font-size="16" fill="#d7faff">DylanK77 / controlled cyber lab</text>
  <g clip-path="url(#clip)">
    <rect class="scan" x="42" y="42" width="916" height="84" fill="#00e5ff" opacity="0.08"/>
    <text x="64" y="112" class="mono" font-size="20" fill="#39ff14">dylan@lab:~$ ./security-lab --observe --document</text>
    <text class="mono l1" x="64" y="158" font-size="18" fill="#d7faff">[00:00:01] SYSTEM STATUS: ONLINE</text>
    <text class="mono l2" x="64" y="196" font-size="18" fill="#00e5ff">[00:00:03] honeypot trap listening on isolated interface</text>
    <text class="mono l3" x="64" y="234" font-size="18" fill="#8a2be2">[00:00:05] packet capture stream indexed for analysis</text>
    <text class="mono l4" x="64" y="272" font-size="18" fill="#39ff14">[00:00:07] malware lab snapshot verified</text>
    <text class="mono l5" x="64" y="310" font-size="18" fill="#d7faff">[00:00:09] objective: observe - detect - document - harden</text>
    <rect class="cursor" x="64" y="338" width="13" height="22" fill="#00e5ff"/>
  </g>
</svg>
